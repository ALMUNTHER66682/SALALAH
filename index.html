<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>رحلتنا من بدية إلى صلالة 2026</title>
<meta name="author" content="المنذر عامر الحجري (أبو النعمان)">
<meta name="description" content="مسابقة عائلية تفاعلية لرحلات الطريق الطويل — تعمل بدون إنترنت. فكرة: المنذر عامر الحجري (أبو النعمان).">
<style>
  :root{
    --ink:#0C1226;         /* deep desert night */
    --ink2:#141E3C;
    --panel:#1B294F;
    --panel2:#22336A;
    --line:rgba(255,255,255,.10);
    --text:#FBF7EE;
    --muted:#9DB0D8;
    --gold:#FFB93E;        /* sunset over the dunes */
    --gold2:#FF8A2B;
    --green:#2FCB8E;       /* Salalah khareef */
    --pink:#FF5D8F;        /* kid delight */
    --sky:#38B6D6;
    --dune1:#E4B24C;
    --dune2:#C98A2E;
    --shadow:0 18px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button,.pchip,.rcard,.toggle,.choice{touch-action:manipulation}
  button{-webkit-appearance:none;appearance:none;font-family:inherit;cursor:pointer;color:inherit}
  html,body{margin:0;height:100%}
  body{
    font-family:system-ui,-apple-system,"SF Arabic","Segoe UI","Noto Sans Arabic",Tahoma,sans-serif;
    background:var(--ink);color:var(--text);
    overflow-x:hidden;position:relative;min-height:100%;
    -webkit-font-smoothing:antialiased;
  }
  /* ---------- animated background ---------- */
  #bg{position:fixed;top:0;right:0;bottom:0;left:0;inset:0;z-index:-2;overflow:hidden;
    background:
      radial-gradient(1200px 500px at 50% 118%, rgba(255,138,43,.28), transparent 60%),
      linear-gradient(180deg,#070B1B 0%, #0C1330 42%, #142046 78%, #16264f 100%);}
  .star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.7;
    animation:tw 3s infinite ease-in-out}
  @keyframes tw{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:.9;transform:scale(1.15)}}
  .dune{position:fixed;left:-6%;right:-6%;bottom:-2px;z-index:-1;height:190px;
    border-radius:50% 50% 0 0/100% 100% 0 0;filter:blur(.3px)}
  #dune-back{background:var(--dune2);opacity:.55;height:150px;transform:translateY(28px) scaleX(1.15)}
  #dune-front{background:linear-gradient(180deg,var(--dune1),var(--dune2));box-shadow:0 -8px 30px rgba(0,0,0,.25)}
  /* ---------- app shell ---------- */
  #app{position:relative;z-index:1;max-width:680px;margin:0 auto;min-height:100vh;min-height:100svh;
    padding:calc(14px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right))
            calc(40px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left))}
  .screen{animation:pop .35s cubic-bezier(.2,.9,.25,1.2)}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  /* ---------- journey bar ---------- */
  .journey{direction:ltr;background:rgba(10,16,36,.55);border:1px solid var(--line);
    border-radius:18px;padding:12px 14px 10px;margin-bottom:14px;
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  .jtrack{position:relative;height:26px;margin:4px 6px 0}
  .jline{position:absolute;top:50%;left:0;right:0;height:6px;transform:translateY(-50%);
    border-radius:6px;background:linear-gradient(90deg,var(--dune1),var(--green));opacity:.35}
  .jfill{position:absolute;top:50%;left:0;height:6px;transform:translateY(-50%);border-radius:6px;
    background:linear-gradient(90deg,var(--gold),var(--green));box-shadow:0 0 12px var(--gold);
    transition:width .6s cubic-bezier(.2,.9,.25,1.2)}
  .jcar{position:absolute;top:-9px;font-size:26px;transform:translateX(-50%);
    transition:left .6s cubic-bezier(.2,.9,.25,1.2);filter:drop-shadow(0 4px 6px rgba(0,0,0,.5))}
  .jend{position:absolute;top:-4px;font-size:20px}
  .jstart{left:-2px}.jfinish{right:-2px}
  .jcap{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:8px;direction:rtl}
  /* ---------- typography / hero ---------- */
  .hero{text-align:center;padding:8px 0 4px}
  .eyebrow{display:inline-block;background:rgba(255,185,62,.13);color:var(--gold);
    border:1px solid rgba(255,185,62,.42);border-radius:999px;padding:7px 17px;
    font-size:13px;font-weight:800;margin-bottom:14px;letter-spacing:.3px}
  .credit{margin-top:24px;padding-top:15px;border-top:1px solid var(--line);
    text-align:center;color:var(--muted);font-size:12.5px;line-height:1.75}
  .credit .who{display:block;color:var(--gold);font-weight:800;font-size:14.5px;margin-top:4px}
  h1.title{font-size:clamp(26px,7vw,42px);line-height:1.15;margin:.1em 0;font-weight:900;
    background:linear-gradient(180deg,#fff, var(--gold) 60%, var(--gold2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 6px 24px rgba(255,138,43,.25)}
  .subtitle{color:var(--green);font-weight:800;font-size:clamp(15px,4vw,20px);margin:.2em 0}
  .lede{color:var(--muted);font-size:14px;max-width:440px;margin:10px auto 0;line-height:1.7}
  .emojiRow{font-size:30px;margin:14px 0 6px;letter-spacing:6px}
  /* ---------- buttons ---------- */
  .btn{display:block;width:100%;border:0;border-radius:16px;padding:16px 18px;font-size:18px;
    text-align:center;text-decoration:none;
    font-weight:800;color:#12203f;cursor:pointer;font-family:inherit;
    background:linear-gradient(180deg,var(--gold),var(--gold2));box-shadow:var(--shadow);
    transition:transform .08s ease, filter .2s;margin-top:12px}
  .btn:active{transform:translateY(2px) scale(.99)}
  .btn.green{background:linear-gradient(180deg,#4CE0A6,var(--green));color:#062616}
  .btn.pink{background:linear-gradient(180deg,#FF87AC,var(--pink));color:#3a0518}
  .btn.ghost{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line);box-shadow:none}
  .btn.sky{background:linear-gradient(180deg,#63CFE8,var(--sky));color:#052733}
  .btn.sm{padding:12px;font-size:15px;margin-top:0}
  .btnRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  /* ---------- cards / panels ---------- */
  .panel{background:linear-gradient(180deg,var(--panel),var(--ink2));border:1px solid var(--line);
    border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-top:14px}
  .card-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;
    font-weight:800;font-size:13px}
  .sectionTitle{font-weight:900;font-size:20px;margin:2px 0 10px;display:flex;align-items:center;gap:8px}
  /* ---------- players setup ---------- */
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .plist{display:flex;flex-direction:column;gap:9px;margin-top:8px}
  .pslot{display:flex;align-items:stretch;gap:8px}
  .pchip{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);
    border:2px solid var(--line);border-radius:16px;padding:10px;cursor:pointer;transition:.15s;position:relative;
    flex:1;min-width:0;text-align:start;color:inherit;font-family:inherit}
  .pchip .av{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:24px;flex:0 0 auto}
  .pchip .pinfo{min-width:0;flex:1}
  .pchip .nm{display:block;font-weight:800;font-size:16px;line-height:1.15;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pchip .ag{display:block;font-size:12px;color:var(--muted);margin-top:2px}
  .pchip.off{opacity:.4;filter:grayscale(.6)}
  .pchip .tick{font-size:17px;flex:0 0 auto;margin-inline-start:auto}
  .pdel{width:46px;flex:0 0 auto;border-radius:14px;font-size:18px;font-weight:900;
    background:rgba(255,93,143,.13);border:1px solid rgba(255,93,143,.38);color:#FF9BBB;cursor:pointer}
  .pdel:active{background:rgba(255,93,143,.28)}
  /* حجم الخط 16px إلزامي: أي أصغر يجعل iOS يكبّر الشاشة تلقائياً عند الكتابة */
  .addrow{display:flex;gap:8px;margin-top:12px}
  .fld{background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:14px;
    padding:12px 13px;color:var(--text);font-family:inherit;font-size:16px;min-height:48px;
    flex:1;min-width:0;-webkit-appearance:none;appearance:none}
  .fld:focus{outline:2px solid var(--sky);outline-offset:1px;border-color:var(--sky)}
  .fld::placeholder{color:var(--muted);opacity:.85}
  .fld.age{flex:0 0 84px;text-align:center}
  .addbtn{flex:0 0 52px;border-radius:14px;font-size:24px;font-weight:900;cursor:pointer;
    background:linear-gradient(180deg,#4CE0A6,var(--green));color:#062616;border:0}
  .empty{text-align:center;padding:22px 14px;border:1px dashed var(--line);
    border-radius:16px;margin-top:8px;background:rgba(255,255,255,.03)}
  .empty .ic{font-size:38px;display:block;margin-bottom:6px}
  .empty b{font-size:16px;display:block}
  .errline{font-size:13px;margin-top:9px;text-align:center;color:var(--pink)}
  .errline.ok{color:var(--green)}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:10px}
  .stepper{display:flex;align-items:center;gap:14px}
  .stepper button{width:44px;height:44px;border-radius:13px;border:0;font-size:24px;font-weight:900;
    background:var(--panel2);color:#fff;cursor:pointer}
  .stepper .val{font-size:22px;font-weight:900;min-width:30px;text-align:center}
  .toggle{width:60px;height:34px;border-radius:999px;background:#3a4a78;position:relative;cursor:pointer;transition:.2s;flex:0 0 auto;border:0;padding:0}
  .toggle::before{content:"";position:absolute;inset:-7px -4px;border-radius:999px}
  .toggle.on{background:var(--green)}
  .toggle::after{content:"";position:absolute;top:4px;right:4px;width:26px;height:26px;border-radius:50%;background:#fff;transition:.2s}
  .toggle.on::after{right:30px}
  /* ---------- rounds menu ---------- */
  .rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  .rcard{position:relative;border:1px solid var(--line);border-radius:18px;padding:14px;cursor:pointer;
    background:linear-gradient(180deg,var(--panel),var(--ink2));transition:transform .1s;overflow:hidden;
    width:100%;text-align:start;color:inherit;font-family:inherit;display:block}
  .rcard:active{transform:scale(.97)}
  .rcard .ic{display:block;font-size:30px;line-height:1.1}
  .rcard .rn{display:block;font-weight:900;font-size:16px;margin-top:6px;line-height:1.2}
  .rcard .rt{display:block;font-size:12px;color:var(--muted);margin-top:3px}
  .rcard .done{position:absolute;top:10px;left:10px;background:var(--green);color:#04240f;
    font-weight:900;font-size:12px;border-radius:999px;padding:2px 9px}
  .rcard .stripe{display:block;position:absolute;inset:0 auto 0 0;width:6px}
  /* ---------- gameplay ---------- */
  .turnbar{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);
    border:1px solid var(--line);border-radius:16px;padding:10px 14px}
  .turnbar .av{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:26px;flex:0 0 auto}
  .turnbar .who{font-weight:900;font-size:18px}
  .turnbar .prog{margin-inline-start:auto;font-size:13px;color:var(--muted);font-weight:700;text-align:center}
  .qcard{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
    border-radius:22px;padding:22px 18px;margin-top:14px;text-align:center;min-height:150px;
    display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow)}
  .qcat{font-weight:800;font-size:13px;color:var(--gold);margin-bottom:12px}
  .qtext{font-size:clamp(20px,5.6vw,26px);font-weight:800;line-height:1.5}
  .answer{margin-top:16px;padding:14px;border-radius:16px;background:rgba(47,203,142,.14);
    border:1px dashed var(--green);animation:pop .3s;font-size:clamp(17px,4.6vw,22px)}
  .answer b{color:var(--green)}
  .hintline{color:var(--muted);font-size:13px;margin-top:8px}
  .choices{display:grid;gap:8px;margin-top:16px;text-align:right;animation:pop .3s}
  .choice{display:flex;align-items:center;gap:10px;background:rgba(56,182,214,.12);
    border:1px solid rgba(56,182,214,.45);border-radius:14px;padding:11px 13px;
    font-size:clamp(16px,4.3vw,19px);font-weight:700}
  .choice .cl{width:26px;height:26px;border-radius:8px;flex:0 0 auto;display:grid;place-items:center;
    background:var(--sky);color:#052733;font-weight:900;font-size:14px}
  .halfTag{display:inline-block;background:rgba(56,182,214,.2);color:var(--sky);
    border:1px solid rgba(56,182,214,.45);border-radius:999px;padding:2px 9px;font-size:11px;margin-inline-start:6px}
  .scorestrip{display:flex;gap:8px;overflow-x:auto;padding:12px 2px 4px;margin-top:12px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  .scorestrip::-webkit-scrollbar{display:none}
  .sitem{flex:0 0 auto;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);
    border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:800;font-size:14px}
  .sitem .d{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:14px}
  .spotgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .spotbtn{display:flex;align-items:center;gap:8px;justify-content:center;border:1px solid var(--line);
    border-radius:14px;padding:12px;font-weight:800;cursor:pointer;background:rgba(255,255,255,.06);color:#fff}
  .spotbtn:active{transform:scale(.97)}
  /* ---------- results ---------- */
  .lead{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:16px;margin-top:10px;
    background:rgba(255,255,255,.05);border:1px solid var(--line)}
  .lead .rank{font-size:22px;font-weight:900;min-width:34px;text-align:center}
  .lead .av{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-size:22px;flex:0 0 auto}
  .lead .nm{font-weight:900;font-size:17px}
  .lead .pts{margin-inline-start:auto;font-weight:900;font-size:18px;color:var(--gold)}
  .lead.top{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,185,62,.16),rgba(255,138,43,.06))}
  .rp{font-size:12px;color:var(--muted)}
  .champ{text-align:center;padding:22px 16px;border-radius:24px;margin-top:8px;
    background:radial-gradient(400px 200px at 50% 0%,rgba(255,185,62,.25),transparent),
    linear-gradient(180deg,var(--panel2),var(--ink2));border:1px solid var(--gold);box-shadow:var(--shadow)}
  .champ .crown{font-size:52px;animation:float 2.4s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .champ .cav{width:92px;height:92px;border-radius:50%;display:grid;place-items:center;font-size:48px;margin:6px auto;
    box-shadow:0 0 0 6px rgba(255,185,62,.25)}
  .champ .cnm{font-size:30px;font-weight:900}
  .champ .cpts{color:var(--gold);font-weight:900;font-size:20px;margin-top:4px}
  .award{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:15px;margin-top:9px;
    background:rgba(255,255,255,.05);border:1px solid var(--line)}
  .award .av{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:21px;flex:0 0 auto}
  .award .t{font-weight:900;font-size:15px}
  .award .n{font-size:12px;color:var(--muted)}
  #confetti{position:fixed;top:0;right:0;bottom:0;left:0;inset:0;pointer-events:none;z-index:50}
  .btn.wa{background:linear-gradient(180deg,#3BE07C,#25D366);color:#04331A}
  .shareBox{white-space:pre-wrap;background:rgba(0,0,0,.28);border:1px solid var(--line);
    border-radius:14px;padding:13px;font-size:13px;line-height:1.85;color:var(--text);
    max-height:210px;overflow-y:auto;-webkit-overflow-scrolling:touch;
    -webkit-user-select:text;user-select:text;text-align:right}
  .footnote{text-align:center;color:var(--muted);font-size:12px;margin-top:22px;line-height:1.7}
  @media (max-width:360px){.pgrid,.rgrid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.05s!important}}
</style>
</head>
<body>
<div id="bg"></div>
<div id="dune-back" class="dune"></div>
<div id="dune-front" class="dune"></div>
<canvas id="confetti"></canvas>
<div id="app"></div>

<script>
"use strict";
/* ============================================================
   رحلتنا من بدية إلى صلالة 2026
   لعبة مسابقات تفاعلية — تعمل بالكامل بدون إنترنت
   ============================================================ */
const $ = id => document.getElementById(id);
const app = $("app");
const rand = a => a[Math.floor(Math.random()*a.length)];
const randInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const shuffle = a => { a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const esc = s => String(s).replace(/</g,"&lt;").replace(/>/g,"&gt;");

/* ---------------- Players ---------------- */
const ageToLevel = a => a<=7?1 : a<=11?2 : a<=14?3 : 4;
/* يُعرض للمستخدم حتى يرى بنفسه أن العمر غيّر مستوى الأسئلة */
const LEVEL_NAMES={1:"أسئلة سهلة",2:"أسئلة متوسطة",3:"أسئلة متقدّمة",4:"أسئلة صعبة"};
const EMOJI_POOL=["🦁","🦋","🚀","⚽","🐣","👑","🦊","🐼","🦉","🐬","🦄","🐧","🐨","🌟","🐝","🦖","🎨","🎧","🍀","🐙","🐢","🦩","🎸","🍉"];
const COLOR_POOL=["#FFB93E","#FF5D8F","#38B6D6","#2FCB8E","#B98CFF","#FF8A2B","#FFD166","#7BD8FF","#6EE7B7","#FF9F6E"];
let _pidSeq=0;
function freeEmoji(){
  const used=new Set(state.players.map(p=>p.emoji));
  return EMOJI_POOL.find(e=>!used.has(e)) || rand(EMOJI_POOL);
}
function initScores(p){ state.scores[p.id]=0; state.catScores[p.id]={}; state.solo[p.id]=0; }
function addPlayer(name, age){
  const p={ id:"np"+(++_pidSeq), name:name, age:age, emoji:freeEmoji(),
            color:COLOR_POOL[(state.players.length)%COLOR_POOL.length],
            level:ageToLevel(age), active:true };
  state.players.push(p); initScores(p); return p;
}
function removePlayer(id){
  const i=state.players.findIndex(p=>p.id===id);
  if(i<0) return false;
  state.players.splice(i,1);
  delete state.scores[id]; delete state.catScores[id]; delete state.solo[id];
  return true;
}
/* لا توجد أسماء مُسبقة — تُسجَّل قبل بدء المسابقة (حفاظاً على الخصوصية) */
const PLAYERS = [];

/* ---------------- Categories (rounds) ---------------- */
const CATS = [
  {id:"quick",  name:"أسئلة سريعة",       emoji:"⚡", type:"quiz",    color:"#FFB93E", tag:"سرعة بديهة"},
  {id:"iq",     name:"ذكاء وألغاز",        emoji:"🧠", type:"quiz",    color:"#B98CFF", tag:"تفكير"},
  {id:"math",   name:"حساب صاروخي",        emoji:"🔢", type:"quiz",    color:"#38B6D6", tag:"أرقام"},
  {id:"observe",name:"عيون على الطريق",    emoji:"👀", type:"spot",    color:"#2FCB8E", tag:"ملاحظة"},
  {id:"animals",name:"عالم الحيوان",       emoji:"🦁", type:"quiz",    color:"#FF8A2B", tag:"طبيعة"},
  {id:"science",name:"علوم ومعرفة",        emoji:"🔬", type:"quiz",    color:"#63CFE8", tag:"علوم"},
  {id:"oman",   name:"عُمان بلدي",         emoji:"🇴🇲", type:"quiz",    color:"#4CE0A6", tag:"وطن"},
  {id:"theater",name:"مسرح السيارة",       emoji:"🎭", type:"perform", color:"#FF5D8F", tag:"تمثيل"},
  {id:"sound",  name:"تحدي الأصوات",       emoji:"🎤", type:"perform", color:"#FF87AC", tag:"حركة"},
  {id:"values", name:"كنز الأخلاق",        emoji:"❤️", type:"perform", color:"#FF6B6B", tag:"قيم"},
];
const CAT = Object.fromEntries(CATS.map(c=>[c.id,c]));

/* ============================================================

/* مولّد بدائل رقمية قريبة من الإجابة (حتى لا تكون الاختيارات سهلة التخمين) */
function numOpts(ans){
  const n=Number(ans); if(!isFinite(n)) return null;
  const set=new Set(); let guard=0;
  while(set.size<3 && guard++<200){
    const r=Math.random(); let d;
    if(r<.45)      d = n + (Math.random()<.5?1:-1)*randInt(1,3);
    else if(r<.75) d = n + (Math.random()<.5?1:-1)*randInt(4,12);
    else           d = Math.round(n*rand([.5,1.5,2]));
    d=Math.round(d);
    if(d!==n && d>=0) set.add(String(d));
  }
  return set.size===3 ? [...set] : null;
}

/* ---- مولّد الحساب ---- */
function genMath(level){
  let q,a;
  if(level<=1){
    const x=randInt(1,9), y=randInt(1,9);
    if(Math.random()<.5){a=x+y; q=`${x} + ${y} = ؟`;}
    else{const hi=Math.max(x,y),lo=Math.min(x,y); a=hi-lo; q=`${hi} − ${lo} = ؟`;}
  } else if(level===2){
    const r=Math.random();
    if(r<.4){const x=randInt(10,49),y=randInt(10,49); a=x+y; q=`${x} + ${y} = ؟`;}
    else if(r<.7){const x=randInt(20,80),y=randInt(1,x); a=x-y; q=`${x} − ${y} = ؟`;}
    else{const x=randInt(2,9),y=randInt(2,9); a=x*y; q=`${x} × ${y} = ؟`;}
  } else if(level===3){
    const r=Math.random();
    if(r<.4){const x=randInt(3,12),y=randInt(3,12); a=x*y; q=`${x} × ${y} = ؟`;}
    else if(r<.7){const y=randInt(2,12),a2=randInt(2,12); a=a2; q=`${y*a2} ÷ ${y} = ؟`;}
    else{const x=randInt(20,99),y=randInt(20,99); a=x+y; q=`${x} + ${y} = ؟`;}
  } else {
    const r=Math.random();
    if(r<.35){const x=randInt(11,29),y=randInt(3,9); a=x*y; q=`${x} × ${y} = ؟`;}
    else if(r<.6){const y=randInt(3,15),a2=randInt(4,15); a=a2; q=`${y*a2} ÷ ${y} = ؟`;}
    else if(r<.8){const x=randInt(2,12),y=randInt(2,12),z=randInt(1,20); a=x*y+z; q=`${x} × ${y} + ${z} = ؟`;}
    else{const base=randInt(20,80),p=rand([10,20,25,50]); a=Math.round(base*p/100); q=`كم يساوي ${p}% من ${base}؟`;}
  }
  return {q, a:String(a), opts:numOpts(a)};
}

/* ---- مولّد المتتاليات ---- */
function genSeq(level){
  const geo = level>=3 && Math.random()<.4;
  const arr=[];
  if(geo){
    let start=randInt(1,3), ratio=rand([2,3]); arr.push(start);
    for(let i=0;i<4;i++) arr.push(arr[arr.length-1]*ratio);
  } else {
    let start=randInt(1,level*3), step=randInt(1,level*2+1); arr.push(start);
    for(let i=0;i<4;i++) arr.push(arr[arr.length-1]+step);
  }
  const ans=arr[4];
  return {q:`ما العدد التالي في المتتالية؟  ${arr.slice(0,4).join("، ")}، ...`, a:String(ans), opts:numOpts(ans)};
}

}

function buildChoices(item){
  if(!item || item.noOpts) return null;
  if(!item.opts || !item.opts.length) return null;
  const correct=item.choiceAns || item.a;

/* عرض الكسور بشكل مدرسي مألوف: ½ و ٣½ */
function fmt(n){
  const w=Math.floor(n);
  if(n===w) return String(w);
  return (w===0?"":w)+"½";
}
/* جمع عربي سليم للمرّات: مرة / مرتين / 5 مرات / 15 مرة */
function times(n){
  if(n===1) return "مرة واحدة";
  if(n===2) return "مرتين";
  if(n>=3 && n<=10) return n+" مرات";
  return n+" مرة";
}
/* صياغة عربية سليمة: درجة واحدة / درجتان / 5 درجات / 15 درجة / ٣½ درجة */
function deg(n){
  if(n===0) return "بلا درجات";
  if(n===0.5) return "½ درجة";
  if(n===1) return "درجة واحدة";
  if(n===2) return "درجتان";
  const w=Math.floor(n);
  if(n===w && w>=3 && w<=10) return w+" درجات";
  return fmt(n)+" درجة";
}

let AC=null;
function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==="suspended") AC.resume(); return AC; }
function tone(freq,start,dur,type="sine",vol=.2){
  const ac=audio(); if(!ac||!state.settings.sound) return;
  const t=ac.currentTime+start;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g).connect(ac.destination); o.start(t); o.stop(t+dur+.02);
}

function mix(c1,c2,t){
  const h=x=>[1,3,5].map(i=>parseInt(x.slice(i,i+2),16));
  const [r1,g1,b1]=h(c1),[r2,g2,b2]=h(c2);
  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}
function paintBackground(){
  const t=progress();
  // الكثبان تتحوّل من ذهبي رملي إلى أخضر صلالة كلما تقدّمنا
  $("dune-front").style.background=`linear-gradient(180deg, ${mix("#E4B24C","#2FCB8E",t)}, ${mix("#C98A2E","#1E8A5E",t)})`;
  $("dune-back").style.background=mix("#C98A2E","#1E8A5E",t);
}
function journeyHTML(){
  const t=progress(); const pct=Math.round(t*100);
  const carPos = 6 + t*82; // من اليسار (بدية) إلى اليمين (صلالة) داخل شريط LTR
  return `<div class="journey">
    <div class="jtrack">
      <div class="jline"></div>
      <div class="jfill" style="width:${pct}%"></div>
      <span class="jend jstart">🏜️</span>
      <span class="jend jfinish">🌴</span>
      <span class="jcar" style="left:${carPos}%">🚙</span>
    </div>
    <div class="jcap"><span>بدية</span><span>${state.done.size} / ${CATS.length} جولات · ${pct}% من الطريق</span><span>صلالة</span></div>
  </div>`;
}
function scoreStripHTML(){
  const items=[...active()].sort((a,b)=>state.scores[b.id]-state.scores[a.id]).map(p=>
    `<div class="sitem"><span class="d" style="background:${p.color}22">${p.emoji}</span>${p.name}: <b style="color:var(--gold)">${fmt(state.scores[p.id])}</b></div>`).join("");
  return `<div class="scorestrip">${items}</div>`;
}

    </div>
    <div class="panel">
      <div class="sectionTitle">⚙️ الإعدادات</div>
      <div class="setrow">
        <div><b>عدد الأسئلة لكل لاعب</b><div class="rp">في جولات الأسئلة (كل جولة)</div></div>

/* ---------------- تشغيل الجولات ---------------- */
function startRound(catId){
  const c=CAT[catId]; const A=active();
  const cur={ catId, type:c.type, idx:0, phase:"q", roundPts:{}, q:null, prompt:null, usedOpts:false, choices:null };
  A.forEach(p=>cur.roundPts[p.id]=0);

  if(c.type==="quiz"){
    let turns=[]; for(let r=0;r<state.settings.qpp;r++) A.forEach(p=>turns.push(p.id));
    cur.turns=turns; cur.total=turns.length;
  } else if(c.type==="spot"){
    const count=Math.min(OBSERVE.length, Math.max(6, A.length+2));
    cur.cards=shuffle(OBSERVE).slice(0,count); cur.total=cur.cards.length;
  } else { // perform
    const deck = catId==="theater"?THEATER : catId==="sound"?SOUND : VALUES;
    cur.turns=shuffle(A.map(p=>p.id));
    cur.prompts=shuffle(deck).slice(0,cur.turns.length); cur.total=cur.turns.length;
  }
  state.current=cur;
  renderGame();
}

function playerById(id){ return state.players.find(p=>p.id===id); }

function renderGame(){
  const cur=state.current, c=CAT[cur.catId];
  paintBackground();
  if(cur.type==="quiz")    return renderQuiz(cur,c);
  if(cur.type==="spot")    return renderSpot(cur,c);
  return renderPerform(cur,c);
}

function gameHeader(cur,c){
  return `${journeyHTML()}
    <div class="badge" style="background:${c.color}22;color:${c.color};border:1px solid ${c.color}55">${c.emoji} جولة: ${c.name}</div>`;
}

function renderQuiz(cur,c){
  const p=playerById(cur.turns[cur.idx]);
  if(!cur.q) cur.q=getQuestion(cur.catId, p.level);
  const revealed = cur.phase==="reveal";
  const canOffer = !!buildChoices(cur.q);
  const pts = cur.usedOpts ? PTS_HALF : PTS_FULL;

  const choicesHTML = cur.choices ? `<div class="choices">${
    cur.choices.map((ch,i)=>`<div class="choice"><span class="cl">${CH_LETTERS[i]}</span>${esc(ch)}</div>`).join("")
  }</div>` : "";

  app.innerHTML=`<div class="screen">
    ${gameHeader(cur,c)}
    <div class="turnbar" style="margin-top:12px">
      <span class="av" style="background:${p.color}22">${p.emoji}</span>
      <div><div class="who">دور: ${p.name}</div><div class="rp">${p.age} سنة · مستوى مناسب</div></div>
      <div class="prog">سؤال<br>${cur.idx+1} / ${cur.total}</div>
    </div>
    <div class="qcard">
      <div class="qcat">${c.emoji} ${c.name} ${cur.usedOpts?`<span class="halfTag">🅰️ اختيارات · ½ درجة</span>`:``}</div>
      <div class="qtext">${esc(cur.q.q)}</div>
      ${choicesHTML}
      ${revealed?`<div class="answer">الإجابة: <b>${esc(cur.q.a)}</b></div>`:``}
    </div>
    ${revealed
      ? `<div class="btnRow">
           <button class="btn green" id="right">✅ صحيحة (${deg(pts)})</button>
           <button class="btn ghost" id="tried">🙂 محاولة جيدة</button>
         </div>`
      : `<button class="btn" id="reveal">👁️ أظهر الإجابة</button>
         ${(canOffer && !cur.usedOpts)
            ? `<button class="btn sky" id="ask">🅰️ أعطني اختيارات (نصف درجة)</button>
               <div class="rp" style="text-align:center;margin-top:8px">أجب وحدك = درجة كاملة · اطلب الاختيارات = ½ درجة فقط</div>`
            : ``}`}
    ${scoreStripHTML()}
    <button class="btn ghost sm" id="quit" style="margin-top:8px">⏹️ إنهاء الجولة</button>
  </div>`;

  if(!revealed){
    $("reveal").onclick=()=>{ SFX.click(); cur.phase="reveal"; renderQuiz(cur,c); };
    if(canOffer && !cur.usedOpts) $("ask").onclick=()=>{
      SFX.reveal(); cur.usedOpts=true; cur.choices=buildChoices(cur.q); renderQuiz(cur,c);
    };
  } else {
    $("right").onclick=()=>{
      SFX.correct(); addPoints(p.id,cur.catId,pts);
      if(!cur.usedOpts) state.solo[p.id]=(state.solo[p.id]||0)+1;
      miniConfetti(); nextTurn();
    };
    $("tried").onclick=()=>{ SFX.wrong(); nextTurn(); };
  }
  $("quit").onclick=()=>{ SFX.click(); endRound(); };
}

function renderSpot(cur,c){
  const card=cur.cards[cur.idx];
  const btns=active().map(p=>`<button class="spotbtn" data-id="${p.id}" style="border-color:${p.color}66">
     <span>${p.emoji}</span> ${p.name}</button>`).join("");

  </div>`;
  $("great").onclick=()=>{ SFX.correct(); addPoints(p.id,cur.catId,PTS_FULL); miniConfetti(); nextTurn(); };
  $("ok").onclick=()=>{ SFX.point(); addPoints(p.id,cur.catId,PTS_HALF); nextTurn(); };
  $("quit").onclick=()=>{ SFX.click(); endRound(); };
}

function nextTurn(){
  const cur=state.current;
  cur.idx++; cur.phase="q"; cur.q=null; cur.usedOpts=false; cur.choices=null;
  if(cur.idx>=cur.total) return endRound();
  renderGame();
}

function endRound(){
  const cur=state.current;
  state.done.add(cur.catId);
  paintBackground();
  const c=CAT[cur.catId];
  const ranked=[...active()].sort((a,b)=>(cur.roundPts[b.id]||0)-(cur.roundPts[a.id]||0));
  const medals=["🥇","🥈","🥉"];
  const roundRows=ranked.map((p,i)=>`
    <div class="lead ${i===0&&(cur.roundPts[p.id]||0)>0?'top':''}">
      <span class="rank">${(cur.roundPts[p.id]||0)>0?(medals[i]||(i+1)):'—'}</span>
      <span class="av" style="background:${p.color}22">${p.emoji}</span>
      <span class="nm">${p.name}</span>
      <span class="pts">+${fmt(cur.roundPts[p.id]||0)}</span>
    </div>`).join("");
  const totalRanked=[...active()].sort((a,b)=>state.scores[b.id]-state.scores[a.id]);
  const totalRows=totalRanked.map((p,i)=>`
    <div class="lead ${i===0?'top':''}">
      <span class="rank">${medals[i]||(i+1)}</span>
      <span class="av" style="background:${p.color}22">${p.emoji}</span>
      <span class="nm">${p.name}</span>
      <span class="pts">${fmt(state.scores[p.id])}</span>
    </div>`).join("");
  SFX.win(); bigConfetti();
  app.innerHTML=`<div class="screen">
    ${journeyHTML()}
    <div class="champ" style="border-color:${c.color}">
      <div class="crown">${c.emoji}</div>
      <div class="cnm">انتهت جولة ${c.name}!</div>
      <div class="rp" style="margin-top:6px">نتائج هذه الجولة 👇</div>
    </div>
    <div class="panel">${roundRows}</div>
    <div class="sectionTitle" style="margin-top:16px">📊 الترتيب العام حتى الآن</div>
    <div class="panel">${totalRows}</div>
    <button class="btn green" id="menu">➡️ الجولة التالية</button>
    <button class="btn pink sm" id="finish" style="margin-top:10px">🏆 إعلان البطل العام</button>
  </div>`;
  $("menu").onclick=()=>{ SFX.click(); renderMenu(); };
  $("finish").onclick=()=>{ SFX.click(); renderFinal(); };
}

/* ---------------- الشاشة النهائية ---------------- */
const TITLES={
  quick:"⚡ صاروخ الأسئلة السريعة", iq:"🧠 عبقري الألغاز", math:"🔢 بطل الحساب",
  observe:"🦅 عين الصقر", animals:"🦁 خبير عالم الحيوان", science:"🔬 عالِم المستقبل",
  oman:"🇴🇲 سفير عُمان", theater:"🎭 نجم التمثيل", sound:"🎤 بطل الأصوات والحركة",
  values:"❤️ صاحب الخُلق الطيّب",
};
function bestTitle(id){
  const cs=state.catScores[id]; let best=null,max=0;
  for(const k in cs){ if(cs[k]>max){ max=cs[k]; best=k; } }
  return best ? TITLES[best] : "⭐ نجم الرحلة";
}
/* ---------- إرسال النتائج ---------- */
function shareText(){
  const ranked=[...active()].sort((a,b)=>state.scores[b.id]-state.scores[a.id]);
  const medals=["🥇","🥈","🥉"];
  const brave=[...active()].sort((a,b)=>(state.solo[b.id]||0)-(state.solo[a.id]||0))[0];
  const bn=state.solo[brave.id]||0;
  let t="🏆 نتائج «رحلتنا من بدية إلى صلالة 2026»\n\n";
  t+="👑 بطل الرحلة: "+ranked[0].name+" — "+deg(state.scores[ranked[0].id])+"\n\n";
  t+=ranked.map((p,i)=>(medals[i]||(i+1)+".")+" "+p.name+" — "+fmt(state.scores[p.id])).join("\n");
  t+="\n\n🏅 الألقاب:\n"+ranked.map(p=>"• "+p.name+": "+bestTitle(p.id)).join("\n");
  if(bn>0) t+="\n\n🦸 الأجرأ بلا اختيارات: "+brave.name+" ("+times(bn)+")";
  t+="\n🗺️ أنجزنا "+state.done.size+" من "+CATS.length+" جولات";
  t+="\n\n💡 فكرة المسابقة: المنذر عامر الحجري (أبو النعمان)";
  return t;
}
function copyText(t){
  try{
    if(navigator.clipboard && window.isSecureContext){ navigator.clipboard.writeText(t); return true; }
  }catch(e){}
  try{
    const ta=document.createElement("textarea");
    ta.value=t; ta.readOnly=false; ta.contentEditable="true";
    ta.style.position="fixed"; ta.style.top="0"; ta.style.opacity="0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    if(ta.setSelectionRange) ta.setSelectionRange(0,999999); // لازم في iOS
    const ok=document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }catch(e){ return false; }
}

function renderFinal(){
  const ranked=[...active()].sort((a,b)=>state.scores[b.id]-state.scores[a.id]);
  if(!ranked.length){ setupMsg="سجّل المتسابقين أولاً."; return renderSetup(); }
  const champ=ranked[0];
  const medals=["🥇","🥈","🥉"];
  const awards=ranked.map((p,i)=>`
    <div class="award">
      <span class="av" style="background:${p.color}22">${p.emoji}</span>
      <div><div class="t">${bestTitle(p.id)}</div><div class="n">${medals[i]||(i+1)+"."} ${p.name} · ${deg(state.scores[p.id])}</div></div>
    </div>`).join("");
  const brave=[...active()].sort((a,b)=>(state.solo[b.id]||0)-(state.solo[a.id]||0))[0];
  const braveN=state.solo[brave.id]||0;
  const braveHTML = braveN>0 ? `
    <div class="sectionTitle" style="margin-top:16px">🦸 جائزة الشجاعة</div>
    <div class="panel" style="border-color:var(--sky)">
      <div class="award" style="border-color:var(--sky)">
        <span class="av" style="background:${brave.color}22">${brave.emoji}</span>
        <div><div class="t">🎯 الأجرأ بلا اختيارات</div>
        <div class="n">${brave.name} أجاب صحيحاً بدون طلب اختيارات ${times(braveN)}</div></div>
      </div>
    </div>` : "";
  SFX.win(); bigConfetti(); setTimeout(bigConfetti,700);
  app.innerHTML=`<div class="screen">
    <div class="hero"><h1 class="title" style="font-size:clamp(24px,7vw,38px)">🏆 بطل رحلتنا 🏆</h1></div>
    <div class="champ">
      <div class="crown">👑</div>
      <div class="cav" style="background:${champ.color}22">${champ.emoji}</div>
      <div class="cnm">${champ.name}</div>
      <div class="cpts">${deg(state.scores[champ.id])}</div>
      <div class="rp" style="margin-top:8px">مبارك للبطل! وكل الأبطال أبدعوا 🎉</div>
    </div>
    ${braveHTML}
    <div class="sectionTitle" style="margin-top:16px">🏅 جائزة لكل بطل</div>
    <div class="panel">${awards}</div>
    <div class="sectionTitle" style="margin-top:16px">📤 إرسال النتائج</div>
    <div class="panel">
      <div class="shareBox" id="sbox">${esc(shareText())}</div>
      <a class="btn wa" id="wa" href="whatsapp://send?text=${encodeURIComponent(shareText())}">📱 إرسال عبر واتساب</a>
      <button class="btn ghost sm" id="copy" style="margin-top:10px">📋 نسخ النتائج</button>
      <div class="rp" id="copyMsg" style="text-align:center;margin-top:9px">أو اضغط مطوّلاً على النص أعلاه لنسخه يدوياً.</div>
    </div>
    <div class="btnRow">
      <button class="btn green sm" id="menu">🗺️ المزيد من الجولات</button>
      <button class="btn pink sm" id="reset">🔄 مسابقة جديدة</button>
    </div>
    <p class="footnote">أهلاً بكم في صلالة! 🌴 نتمنّى لكم رحلة سعيدة ووصولاً آمناً.</p>
    <div class="credit">💡 فكرة المسابقة وإعدادها<span class="who">المنذر عامر الحجري — أبو النعمان</span></div>
  </div>`;
  $("menu").onclick=()=>{ SFX.click(); renderMenu(); };
  $("reset").onclick=()=>{ SFX.click(); if(confirm("بدء مسابقة جديدة وتصفير الدرجات؟")) resetGame(); };
  // مخطط whatsapp:// يفتح التطبيق مباشرة ويعمل بدون إنترنت (بخلاف روابط wa.me التي تحتاج تحميل صفحة)
  $("wa").onclick=()=>{ SFX.click(); };
  $("copy").onclick=()=>{
    SFX.point();
    const ok=copyText(shareText());
    const m=$("copyMsg");
    m.textContent = ok ? "✅ نُسخت النتائج — الصقها في أي محادثة." : "تعذّر النسخ التلقائي؛ اضغط مطوّلاً على النص أعلاه.";
    m.style.color = ok ? "var(--green)" : "var(--gold)";
  };
}

function resetGame(){
  state.players.forEach(p=>{ state.scores[p.id]=0; state.catScores[p.id]={}; state.solo[p.id]=0; });
  state.done=new Set(); state.used=new Set(); state.current=null;
  SFX.point(); paintBackground(); renderMenu();
}

/* ============================================================
   القصاصات الملوّنة (Confetti) + خلفية النجوم
   ============================================================ */
const cvs=$("confetti"), ctx=cvs.getContext("2d");
function sizeCanvas(){ cvs.width=innerWidth; cvs.height=innerHeight; }
sizeCanvas(); addEventListener("resize",sizeCanvas);
let parts=[];
const COLORS=["#FFB93E","#2FCB8E","#FF5D8F","#38B6D6","#B98CFF","#FF8A2B","#ffffff"];
function spawn(n){ for(let i=0;i<n;i++) parts.push({
  x:Math.random()*cvs.width, y:-20-Math.random()*60,
  vx:(Math.random()-.5)*4, vy:2+Math.random()*4, g:.12,
  s:6+Math.random()*7, rot:Math.random()*6, vr:(Math.random()-.5)*.3,
  c:rand(COLORS), life:70+Math.random()*40 }); }
function bigConfetti(){ spawn(120); }
function miniConfetti(){ spawn(40); }
let raf=null;
function loop(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life--;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c;
    ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); ctx.restore(); });
  parts=parts.filter(p=>p.life>0 && p.y<cvs.height+40);
  raf=parts.length?requestAnimationFrame(loop):null;
}
const _spawn=spawn; spawn=function(n){ _spawn(n); if(!raf) raf=requestAnimationFrame(loop); };

(function stars(){
  const bg=$("bg"); const N= innerWidth<420?40:70;
  for(let i=0;i<N;i++){ const s=document.createElement("div"); s.className="star";
    s.style.left=Math.random()*100+"%"; s.style.top=Math.random()*70+"%";
    s.style.animationDelay=(Math.random()*3)+"s";
    s.style.width=s.style.height=(Math.random()<.2?3:2)+"px";
    bg.appendChild(s); }
})();

/* iOS لا يسمح بتشغيل الصوت إلا داخل لمسة حقيقية من المستخدم */
(function unlockAudioOnFirstTouch(){
  const unlock=()=>{
    const ac=audio();
    if(ac){
      try{
        const b=ac.createBuffer(1,1,22050), s=ac.createBufferSource();
        s.buffer=b; s.connect(ac.destination); s.start(0);
      }catch(e){}
    }
    document.removeEventListener("touchend",unlock,true);
    document.removeEventListener("click",unlock,true);
  };
  document.addEventListener("touchend",unlock,true);
  document.addEventListener("click",unlock,true);
})();

/* ---------------- بدء التشغيل ---------------- */
paintBackground();
renderTitle();
</script>
